<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
  <h1>👤 회원가입</h1>
  <p>SKALA-FRONT 회원가입을 환영합니다.</p>

  <form action="signUpResult.html" method="get">
    <fieldset>
      <legend>계정 정보</legend>
      <p>
        <label for="userId">아이디:</label>
        <input type="text" id="userId" name="userId" placeholder="4~15자 영문/숫자" required> (필수)
      </p>
      <p>
        <label for="userPw">비밀번호:</label>
        <input type="password" id="userPw" name="userPw" placeholder="8자 이상 입력" required> (필수)
      </p>
      <p>
        <label for="email">이메일:</label>
        <input type="text" id="email" name="email" placeholder="example">
        @
        <select name="emailDomain">
          <option value="">직접 입력</option>
          <option value="gmail.com">gmail.com</option>
          <option value="naver.com">naver.com</option>
          <option value="daum.net">daum.net</option>
        </select>
      </p>
    </fieldset>

    <fieldset>
      <legend>개인 프로필 정보</legend>
      <p>
        <label for="name">이름:</label>
        <input type="text" id="name" name="name">
      </p>
      <p>
        <label for="birth">생년월일:</label>
        <input type="date" id="birth" name="birth">
      </p>
      <p>
        성별:
        <label><input type="radio" name="gender" value="male" checked> 남성</label>
        <label><input type="radio" name="gender" value="female"> 여성</label>
        <label><input type="radio" name="gender" value="none"> 선택안함</label>
      </p>
      <p>
        관심 분야 (중복 선택 가능):<br>
        <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label><br>
        <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label><br>
        <label><input type="checkbox" name="interest" value="backend"> 백엔드 &amp; 데이터베이스</label><br>
        <label><input type="checkbox" name="interest" value="cloud"> 클라우드 &amp; 인프라</label>
      </p>
      <p>
        <label for="path">가입 경로:</label>
        <select id="path" name="path">
          <option value="">-- 선택해 주세요 --</option>
          <option value="search">검색</option>
          <option value="friend">지인 추천</option>
          <option value="sns">SNS</option>
        </select>
      </p>
    </fieldset>

    <fieldset>
      <legend>자기소개</legend>
      <p>
        <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
        <textarea id="intro" name="intro" rows="5" cols="50" maxlength="200" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
      </p>
    </fieldset>

    <p>
      <input type="submit" value="동의하고 회원가입">
      <input type="reset" value="다시 작성">
    </p>
  </form>
  </div>
</body>
</html>
